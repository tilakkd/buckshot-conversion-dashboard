<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, nocache">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="slurp" content="noindex, nofollow">
<meta name="duckduckbot" content="noindex, nofollow">
<meta name="baiduspider" content="noindex, nofollow">
<meta name="yandex" content="noindex, nofollow">
<meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<title>Buckshot Exteriors - Conversion Dashboard</title>
<style>
:root{
  --bg:#0a0e17; --bg2:#0e1422; --panel:#131a2b; --panel2:#161e32;
  --border:#1f2a44; --border2:#293556;
  --text:#e6ecf5; --muted:#8a94ab; --dim:#5d6a85;
  --green:#22c55e; --green-bg:rgba(34,197,94,.10);
  --red:#ef4444; --red-bg:rgba(239,68,68,.10);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.10);
  --blue:#60a5fa; --purple:#a78bfa;
  --radius:10px;
}
html[data-theme="light"]{
  --bg:#f6f8fc; --bg2:#eef2f9; --panel:#ffffff; --panel2:#f8fafc;
  --border:#e5e9f2; --border2:#d6dce8;
  --text:#0f172a; --muted:#64748b; --dim:#94a3b8;
  --green-bg:rgba(34,197,94,.14); --red-bg:rgba(239,68,68,.12); --amber-bg:rgba(245,158,11,.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:1240px;margin:0 auto;padding:18px 24px 40px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 0 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.brand .dot{width:10px;height:10px;background:var(--green);border-radius:50%;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.brand h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px}
.brand .sub{color:var(--muted);font-size:12px;margin-left:6px}
.windowpicker{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:3px}
.windowpicker button{background:transparent;color:var(--muted);border:0;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer}
.windowpicker button.on{background:var(--text);color:var(--bg)}
.meta{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:14px}
.meta .as{color:var(--text)}
.ico-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--panel);color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.ico-btn:hover{border-color:var(--border2)}

.verdict{padding:18px 22px;margin:16px 0 18px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--radius);position:relative;overflow:hidden}
.verdict::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
.verdict.bad::before{background:var(--red)}
.verdict.good::before{background:var(--green)}
.verdict .label{font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.verdict .line{font-size:18px;line-height:1.45;font-weight:500}
.verdict .line b{color:var(--text);font-weight:700}
.verdict .line .neg{color:var(--red)}
.verdict .line .pos{color:var(--green)}
.verdict .sub{color:var(--muted);font-size:12px;margin-top:4px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative}
.kpi .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.kpi .v{font-size:28px;font-weight:700;margin:4px 0 2px;letter-spacing:-.5px;line-height:1.15}
.kpi .v.red{color:var(--red)}
.kpi .v.green{color:var(--green)}
.kpi .v.amber{color:var(--amber)}
.kpi .meta-line{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px}
.kpi .meta-line b{color:var(--text)}
.trend{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
.trend.down{color:var(--red);background:var(--red-bg)}
.trend.up{color:var(--green);background:var(--green-bg)}
.trend.flat{color:var(--muted);background:rgba(138,148,171,.12)}
.trend svg{width:10px;height:10px}

.grid2{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;margin:18px 0}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.panel h2{font-size:13px;margin:0 0 12px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text)}
.panel h2 .badge{font-size:10px;color:var(--muted);background:var(--border);padding:2px 6px;border-radius:4px;font-weight:500;letter-spacing:.4px}

.src-row{display:grid;grid-template-columns:90px 1fr 50px;gap:10px;align-items:center;font-size:12px;margin-bottom:7px}
.src-row .lbl{color:var(--muted)}
.src-row .bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
.src-row .bar i{display:block;height:100%;border-radius:99px;transition:width .4s ease}
.src-row .val{text-align:right;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.src-row[data-src="organic"] .bar i{background:linear-gradient(90deg,var(--green),#34d399)}
.src-row[data-src="direct"] .bar i{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
.src-row[data-src="paid"] .bar i{background:linear-gradient(90deg,var(--amber),#f97316)}
.src-row[data-src="lsa"] .bar i{background:linear-gradient(90deg,var(--purple),#7c3aed)}
.src-row[data-src="referral"] .bar i{background:linear-gradient(90deg,#8a94ab,#5d6a85)}
.src-row[data-src="unassigned"] .bar i{background:linear-gradient(90deg,#475569,#334155)}

.health-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.health-row:last-child{border-bottom:none}
.health-row .light{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.health-row .light.g{background:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.16)}
.health-row .light.a{background:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.16)}
.health-row .light.r{background:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.16)}
.health-row .h-label{flex:1;color:var(--text)}
.health-row .h-state{color:var(--muted);font-size:11.5px}

.perf-section{margin-bottom:18px}
.perf-tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.perf-tabs button{background:transparent;color:var(--muted);border:0;padding:8px 14px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.perf-tabs button.on{color:var(--text);border-bottom-color:var(--green)}
table.perf{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
table.perf th{text-align:left;color:var(--muted);font-weight:500;padding:8px 8px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
table.perf th.num,table.perf td.num{text-align:right}
table.perf td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text)}
table.perf tr:last-child td{border-bottom:none}
table.perf .status{font-size:10px;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;display:inline-block}
table.perf .status.active{background:var(--green-bg);color:var(--green)}
table.perf .status.paused{background:rgba(138,148,171,.12);color:var(--muted)}
table.perf .status.eligible{background:var(--green-bg);color:var(--green)}

.loading{padding:24px;text-align:center;color:var(--muted);font-size:13px}

@media (max-width: 980px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .meta{font-size:11px}
}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <h1>Buckshot Exteriors</h1>
    <span class="sub">conversion dashboard</span>
  </div>
  <div class="windowpicker" id="wpick">
    <button data-w="7">7 day</button>
    <button data-w="14">14 day</button>
    <button data-w="30" class="on">30 day</button>
    <button data-w="90">90 day</button>
  </div>
  <div class="meta">
    <span>Updated <span class="as" id="asof">--</span></span>
    <button class="ico-btn" id="xlsBtn" title="Download Excel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="ico-btn" id="themeBtn" title="Toggle theme">
      <svg id="themeIco" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="verdict" id="verdict">
  <div class="label">The 5-Second Story</div>
  <div class="line" id="verdictLine">Loading...</div>
  <div class="sub" id="verdictSub"></div>
</div>

<div class="kpi-row" id="kpiRow">
  <div class="kpi"><div class="k">Qualified Leads</div><div class="v" data-k="qualified">--</div><div class="meta-line"><span data-k="qualified-meta">--</span><span class="trend" data-k="qualified-trend"></span></div></div>
  <div class="kpi"><div class="k" id="spendLabel">Ad Spend</div><div class="v" data-k="spend">--</div><div class="meta-line"><span data-k="spend-meta">--</span><span class="trend" data-k="spend-trend"></span></div></div>
  <div class="kpi"><div class="k">Cost / Qualified Lead</div><div class="v" data-k="cpq">--</div><div class="meta-line"><span data-k="cpq-meta">--</span><span class="trend" data-k="cpq-trend"></span></div></div>
  <div class="kpi"><div class="k">LSA Charged Calls</div><div class="v" data-k="lsa">--</div><div class="meta-line"><span data-k="lsa-meta">--</span><span class="trend" data-k="lsa-trend"></span></div></div>
</div>

<div class="grid2">
  <div class="panel">
    <h2>Where Leads Come From <span class="badge" id="srcWin">30 day</span></h2>
    <div id="srcList"><div class="loading">Loading sources...</div></div>
  </div>
  <div class="panel">
    <h2>Account Health</h2>
    <div id="healthList"><div class="loading">Loading health...</div></div>
  </div>
</div>

<div class="panel perf-section">
  <h2>Ad Performance <span class="badge">90 day rollup</span></h2>
  <div class="perf-tabs" id="perfTabs">
    <button data-tab="campaigns" class="on">Campaigns</button>
    <button data-tab="adGroups">Ad Groups</button>
    <button data-tab="keywords">Top Keywords</button>
  </div>
  <div id="perfTable"><div class="loading">Loading...</div></div>
</div>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
(function(){
  var state = { data: null, window: 30, perfTab: 'campaigns' };

  // THEME
  var savedTheme = null;
  try { savedTheme = localStorage.getItem('bx_theme'); } catch(e){}
  if (savedTheme === 'light' || savedTheme === 'dark') document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme') || 'dark';
    var nx = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nx);
    try { localStorage.setItem('bx_theme', nx); } catch(e){}
    updateThemeIcon(nx);
  });
  function updateThemeIcon(t){
    var ico = document.getElementById('themeIco');
    if (t === 'light') ico.innerHTML = '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>';
    else ico.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');

  // WINDOW PICKER
  document.getElementById('wpick').addEventListener('click', function(e){
    var b = e.target.closest('button[data-w]');
    if (!b) return;
    state.window = parseInt(b.getAttribute('data-w'), 10);
    Array.prototype.forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('on', x === b); });
    render();
  });

  // PERF TABS
  document.getElementById('perfTabs').addEventListener('click', function(e){
    var b = e.target.closest('button[data-tab]');
    if (!b) return;
    state.perfTab = b.getAttribute('data-tab');
    Array.prototype.forEach.call(this.querySelectorAll('button'), function(x){ x.classList.toggle('on', x === b); });
    renderPerf();
  });

  // EXCEL
  document.getElementById('xlsBtn').addEventListener('click', function(){
    if (typeof XLSX === 'undefined' || !state.data) return;
    var d = state.data, wb = XLSX.utils.book_new();
    var summary = [
      ['Snapshot', d.snapshot_date || ''],
      ['Window', state.window + ' day'],
      ['As of', (d.windows && d.windows.asOf) || ''],
      [],
      ['Qualified leads (form, 30d)', (d.enquiries && d.enquiries.lead && d.enquiries.lead.qualified) || 0],
      ['Total form submissions (30d)', (d.enquiries && d.enquiries.lead && d.enquiries.lead.total) || 0],
      ['Spam/test forms (30d)', (d.enquiries && d.enquiries.lead && d.enquiries.lead.spamTest) || 0],
      ['LSA charged calls (30d)', (d.kpis && d.kpis.lsaCharged) || 0],
      ['LSA total calls (30d)', (d.kpis && d.kpis.lsaTotal) || 0],
      [],
      ['Ad spend ' + state.window + 'd', getWin().adsCost || 0],
      ['Ad impressions ' + state.window + 'd', getWin().impressions || ''],
      ['Ad clicks ' + state.window + 'd', getWin().clicks || 0],
      ['Avg CPC ' + state.window + 'd', getWin().cpc || ''],
      ['CTR ' + state.window + 'd', getWin().ctr || '']
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Summary');
    if (d.adPerformance) {
      if (d.adPerformance.campaigns) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.adPerformance.campaigns), 'Campaigns');
      if (d.adPerformance.adGroups) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.adPerformance.adGroups), 'Ad Groups');
      if (d.adPerformance.keywords) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.adPerformance.keywords), 'Keywords');
    }
    if (d.leadDetails) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.leadDetails), 'Lead Details');
    if (d.callDetails) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.callDetails), 'Call Details');
    XLSX.writeFile(wb, 'Buckshot_Dashboard_' + (d.snapshot_date || 'export') + '.xlsx');
  });

  function getWin(){
    var d = state.data; if (!d || !d.windows) return {};
    return d.windows['w' + state.window] || d.windows.w30 || {};
  }

  function fmtMoney(n){
    if (n == null || isNaN(n)) return '$--';
    return '$' + Math.round(n).toLocaleString();
  }

  function leadsInWindow(days){
    var d = state.data; if (!d || !d.leadTimeline) return null;
    var asOfStr = (d.windows && d.windows.asOf) || d.snapshot_date;
    if (!asOfStr) return null;
    var asOf = new Date(asOfStr + 'T23:59:59');
    var start = new Date(asOf); start.setDate(start.getDate() - days + 1); start.setHours(0,0,0,0);
    return d.leadTimeline.filter(function(l){
      if (!l.sort) return false;
      var dt = new Date(l.sort.replace(' ', 'T'));
      return dt >= start && dt <= asOf;
    });
  }

  function computeKpis(){
    var d = state.data;
    var win = state.window;
    var w = getWin();
    var spend = w.adsCost || 0;
    var leads = leadsInWindow(win);
    var qualified, lsaCharged;
    if (leads && leads.length >= 0){
      qualified = leads.filter(function(l){ return l.cat === 'qualified'; }).length;
      lsaCharged = leads.filter(function(l){ return l.src === 'call' && l.cat === 'charged'; }).length;
    } else {
      qualified = (d.enquiries && d.enquiries.lead && d.enquiries.lead.qualified) || 0;
      lsaCharged = (d.kpis && d.kpis.lsaCharged) || 0;
    }
    var combinedQualified = qualified + lsaCharged;
    var cpq = combinedQualified > 0 ? Math.round(spend / combinedQualified) : null;
    return {
      qualified: qualified,
      lsaCharged: lsaCharged,
      combined: combinedQualified,
      spend: spend,
      spendDaily: w.adsCostDaily || '',
      impressions: w.impressions || '',
      clicks: w.clicks || 0,
      cpc: w.cpc || '',
      ctr: w.ctr || '',
      cpq: cpq,
      win: win
    };
  }

  function priorQualified(win){
    var p = state.data && state.data.prior;
    if (!p) return null;
    var b = p['w' + win];
    return b && (typeof b.qualified === 'number') ? b.qualified : null;
  }

  function trendBadge(cur, prior, mode){
    // mode 'good' = up is green; 'bad' = up is red
    if (prior == null || cur == null) return {cls:'flat', label:'--', svg:''};
    if (prior === 0 && cur === 0) return {cls:'flat', label:'no change', svg:''};
    if (prior === 0) return {cls: mode==='bad'?'down':'up', label:'new', svg:''};
    var pct = Math.round(((cur - prior) / prior) * 100);
    var up = cur >= prior;
    var cls;
    if (pct === 0) cls = 'flat';
    else if (mode === 'bad') cls = up ? 'down' : 'up'; // higher is bad
    else cls = up ? 'up' : 'down'; // higher is good
    var arrow = up
      ? '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 2.5L10.5 8h-9z"/></svg>'
      : '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 9.5L1.5 4h9z"/></svg>';
    var sign = pct > 0 ? '+' : '';
    return {cls: cls, label: sign + pct + '%', svg: arrow};
  }

  function setTrend(el, t){
    if (!el) return;
    el.className = 'trend ' + t.cls;
    el.innerHTML = t.svg + ' ' + t.label;
  }

    function renderVerdict(k){
    var v = document.getElementById('verdict');
    var line = document.getElementById('verdictLine');
    var sub = document.getElementById('verdictSub');
    var d = state.data;

    // PAID leads only. Calls are attributed to Google LSA; form leads to Google Ads.
    var paidCalls = k.lsaCharged || 0; // LSA charged calls in window
    var paidForms = (d && d.kpis && typeof d.kpis.paidFormLeads === 'number') ? d.kpis.paidFormLeads : 0; // Google Ads form conversions (paid-attributed)
    var totalPaid = paidCalls + paidForms;
    var spendStr = fmtMoney(k.spend);
    var cppStr = totalPaid > 0 ? '$' + Math.round(k.spend / totalPaid).toLocaleString() : 'N/A';

    v.classList.remove('good','bad');
    if (totalPaid === 0) v.classList.add('bad');
    else v.classList.add('good');

    var breakdown = '<b>' + paidCalls + '</b> call' + (paidCalls === 1 ? '' : 's') + ' via LSA, <b>' + paidForms + '</b> form lead' + (paidForms === 1 ? '' : 's') + ' via Google Ads';

    if (totalPaid > 0) {
      line.innerHTML = 'Last ' + k.win + ' days: <b>' + totalPaid + ' paid lead' + (totalPaid === 1 ? '' : 's') + '</b> on <b>' + spendStr + '</b> ad spend - that is <b>' + cppStr + '</b> per paid lead. ' + breakdown + '.';
    } else {
      line.innerHTML = 'Last ' + k.win + ' days: <b>0 paid leads</b> on <b>' + spendStr + '</b> ad spend. ' + breakdown + '.';
    }

    var subParts = [];
    var formQ = k.qualified || 0;
    subParts.push(formQ + ' qualified form enquir' + (formQ === 1 ? 'y' : 'ies') + ' (no paid attribution)');
    if (k.clicks) subParts.push(k.clicks + ' ad clicks at ' + k.cpc + ' avg CPC');
    if (k.spendDaily) subParts.push(k.spendDaily);
    sub.textContent = subParts.join(' . ');
  }

  function renderKpis(k){
    var $ = function(s){ return document.querySelector(s); };
    // Qualified
    var qEl = $('[data-k="qualified"]'); qEl.textContent = k.qualified;
    qEl.className = 'v ' + (k.qualified === 0 ? 'red' : (k.qualified < 5 ? 'amber' : 'green'));
    var pq = priorQualified(k.win);
    $('[data-k="qualified-meta"]').innerHTML = 'vs prior ' + k.win + ': <b>' + (pq != null ? pq : '--') + '</b>';
    setTrend($('[data-k="qualified-trend"]'), trendBadge(k.qualified, pq, 'good'));

    // Spend
    document.getElementById('spendLabel').textContent = 'Ad Spend (' + k.win + 'd)';
    $('[data-k="spend"]').textContent = fmtMoney(k.spend);
    $('[data-k="spend-meta"]').innerHTML = k.spendDaily ? (k.spendDaily + ' . ' + (k.clicks || 0) + ' clicks') : ('--');
    $('[data-k="spend-trend"]').className = 'trend flat';
    $('[data-k="spend-trend"]').innerHTML = (k.cpc || '--') + ' CPC';

    // Cost per qualified
    var cpqEl = $('[data-k="cpq"]');
    cpqEl.textContent = k.cpq != null ? ('$' + k.cpq.toLocaleString()) : 'N/A';
    cpqEl.className = 'v ' + (k.cpq == null ? 'amber' : (k.cpq > 300 ? 'red' : (k.cpq > 150 ? 'amber' : 'green')));
    $('[data-k="cpq-meta"]').innerHTML = 'Combined: <b>' + k.combined + ' qualified</b>';
    var cpqJudge = k.cpq == null ? 'flat' : (k.cpq > 300 ? 'down' : (k.cpq > 150 ? 'flat' : 'up'));
    var cpqLbl = k.cpq == null ? 'no leads' : (k.cpq > 300 ? 'High' : (k.cpq > 150 ? 'Watching' : 'Good'));
    $('[data-k="cpq-trend"]').className = 'trend ' + cpqJudge;
    $('[data-k="cpq-trend"]').textContent = cpqLbl;

    // LSA
    var lsaEl = $('[data-k="lsa"]');
    lsaEl.textContent = k.lsaCharged;
    lsaEl.className = 'v ' + (k.lsaCharged === 0 ? 'red' : (k.lsaCharged < 2 ? 'amber' : 'green'));
    var lsaMeta = '';
    var lsaLast = lastLsaCharged();
    if (lsaLast) lsaMeta = 'Last charged: <b>' + lsaLast.date + '</b>';
    $('[data-k="lsa-meta"]').innerHTML = lsaMeta || '--';
    var daysSince = lsaLast ? daysAgo(lsaLast.sort) : null;
    var lsaLbl = daysSince == null ? '--' : (daysSince <= 3 ? 'Fresh' : (daysSince <= 7 ? 'Recent' : 'Stale'));
    var lsaCls = daysSince == null ? 'flat' : (daysSince <= 3 ? 'up' : (daysSince <= 7 ? 'flat' : 'down'));
    $('[data-k="lsa-trend"]').className = 'trend ' + lsaCls;
    $('[data-k="lsa-trend"]').textContent = lsaLbl;
  }

  function lastLsaCharged(){
    var d = state.data; if (!d || !d.leadTimeline) return null;
    var arr = d.leadTimeline.filter(function(l){ return l.src === 'call' && l.cat === 'charged'; });
    arr.sort(function(a,b){ return (b.sort || '').localeCompare(a.sort || ''); });
    return arr[0] || null;
  }

  function daysAgo(sortStr){
    if (!sortStr) return null;
    var dt = new Date(sortStr.replace(' ', 'T'));
    if (isNaN(dt.getTime())) return null;
    var asOf = state.data && state.data.windows && state.data.windows.asOf
      ? new Date(state.data.windows.asOf + 'T23:59:59') : new Date();
    return Math.max(0, Math.floor((asOf - dt) / 86400000));
  }

  function renderSources(){
    var d = state.data;
    var c = d && d.sourceChart;
    var list = document.getElementById('srcList');
    document.getElementById('srcWin').textContent = '30 day';
    if (!c){ list.innerHTML = '<div class="loading">No source data</div>'; return; }
    var rows = [
      {key:'organic', label:'Organic', val: c.organic || 0},
      {key:'direct', label:'Direct', val: c.direct || 0},
      {key:'paid', label:'Paid Search', val: c.paid || 0},
      {key:'lsa', label:'LSA', val: c.lsa || 0},
      {key:'referral', label:'Referral', val: c.referral || 0},
      {key:'unassigned', label:'Unassigned', val: c.unassigned || 0}
    ];
    var max = Math.max.apply(null, rows.map(function(r){return r.val;})) || 1;
    list.innerHTML = rows.map(function(r){
      var pct = Math.round((r.val / max) * 100);
      return '<div class="src-row" data-src="' + r.key + '">' +
        '<span class="lbl">' + r.label + '</span>' +
        '<span class="bar"><i style="width:' + pct + '%"></i></span>' +
        '<span class="val">' + r.val + '</span>' +
      '</div>';
    }).join('');
  }

  function renderHealth(){
    var d = state.data;
    var rows = [];

    // GA4 generate_lead tag
    var ga4ok = !!(d.verified && d.verified.ga4 !== undefined ? d.verified.ga4 : true);
    rows.push({cls:'g', label:'GA4 generate_lead tag firing', state:'OK'});

    // Ads conversion import
    var totalAdsConv = 0;
    if (d.adPerformance && d.adPerformance.campaigns) totalAdsConv = d.adPerformance.campaigns.reduce(function(s,c){ return s + (c.conversions || 0); }, 0);
    var adsConvOk = totalAdsConv > 0;
    rows.push({cls: adsConvOk ? 'g' : 'r', label:'Google Ads conversion import', state: totalAdsConv + ' / 90d'});

    // Paid landing page conversion
    var paidLeads = (d.sourceChart && d.sourceChart.paid) || 0;
    var paidClicks = (d.kpis && d.kpis.adsClicks) || 0;
    var paidConvLight = (paidLeads === 0 && paidClicks > 20) ? 'r' : (paidLeads < 3 ? 'a' : 'g');
    rows.push({cls: paidConvLight, label:'Paid landing page conversion', state: paidLeads + ' leads / ' + paidClicks + ' clicks'});

    // Live campaign serving
    var anyActive = false, activeName = '';
    if (d.adPerformance && d.adPerformance.campaigns) {
      d.adPerformance.campaigns.forEach(function(c){
        if ((c.status || '').toLowerCase() === 'active'){ anyActive = true; activeName = c.name; }
      });
    }
    rows.push({cls: anyActive ? 'g' : 'r', label:'Live Madison campaign serving', state: anyActive ? 'Active' : 'No active campaign'});

    // Spam ratio
    var lead = d.enquiries && d.enquiries.lead;
    var spamPct = lead && lead.total > 0 ? Math.round((lead.spamTest / lead.total) * 100) : 0;
    var spamCls = spamPct > 60 ? 'a' : (spamPct > 30 ? 'a' : 'g');
    rows.push({cls: spamCls, label:'Spam ratio (forms)', state: spamPct + '% spam'});

    // LSA listing
    var lsaTotal = (d.kpis && d.kpis.lsaTotal) || 0;
    rows.push({cls: lsaTotal > 0 ? 'g' : 'a', label:'LSA listing live', state: lsaTotal > 0 ? 'OK (' + lsaTotal + ' calls 30d)' : 'No recent calls'});

    document.getElementById('healthList').innerHTML = rows.map(function(r){
      return '<div class="health-row">' +
        '<span class="light ' + r.cls + '"></span>' +
        '<span class="h-label">' + r.label + '</span>' +
        '<span class="h-state">' + r.state + '</span>' +
      '</div>';
    }).join('');
  }

  function renderPerf(){
    var d = state.data;
    if (!d || !d.adPerformance){
      document.getElementById('perfTable').innerHTML = '<div class="loading">No ad performance data</div>';
      return;
    }
    var key = state.perfTab;
    var arr = d.adPerformance[key] || [];
    if (!arr.length){
      document.getElementById('perfTable').innerHTML = '<div class="loading">No ' + key + '</div>';
      return;
    }
    var header, rows;
    if (key === 'campaigns'){
      header = '<tr><th>Campaign</th><th></th><th class="num">Impr.</th><th class="num">Clicks</th><th class="num">CTR</th><th class="num">CPC</th><th class="num">Cost</th><th class="num">Conv.</th></tr>';
      rows = arr.slice(0,8).map(function(c){
        var st = (c.status || '').toLowerCase();
        var cls = st === 'active' ? 'active' : (st === 'eligible' ? 'eligible' : 'paused');
        return '<tr>' +
          '<td>' + esc(c.name || '') + '</td>' +
          '<td><span class="status ' + cls + '">' + esc(c.status || '') + '</span></td>' +
          '<td class="num">' + fmtN(c.impressions) + '</td>' +
          '<td class="num">' + (c.clicks || 0) + '</td>' +
          '<td class="num">' + (c.CTR || '') + '</td>' +
          '<td class="num">' + (c.avgCPC || '') + '</td>' +
          '<td class="num">' + fmtMoney(c.cost) + '</td>' +
          '<td class="num">' + (c.conversions || 0) + '</td>' +
        '</tr>';
      }).join('');
    } else if (key === 'adGroups'){
      header = '<tr><th>Ad Group</th><th>Campaign</th><th></th><th class="num">Impr.</th><th class="num">Clicks</th><th class="num">CTR</th><th class="num">CPC</th><th class="num">Cost</th><th class="num">Conv.</th></tr>';
      rows = arr.slice(0,8).map(function(c){
        var st = (c.status || '').toLowerCase();
        var cls = st === 'active' ? 'active' : (st === 'eligible' ? 'eligible' : 'paused');
        return '<tr>' +
          '<td>' + esc(c.name || '') + '</td>' +
          '<td>' + esc(c.campaign || '') + '</td>' +
          '<td><span class="status ' + cls + '">' + esc(c.status || '') + '</span></td>' +
          '<td class="num">' + fmtN(c.impressions) + '</td>' +
          '<td class="num">' + (c.clicks || 0) + '</td>' +
          '<td class="num">' + (c.CTR || '') + '</td>' +
          '<td class="num">' + (c.avgCPC || '') + '</td>' +
          '<td class="num">' + fmtMoney(c.cost) + '</td>' +
          '<td class="num">' + (c.conversions || 0) + '</td>' +
        '</tr>';
      }).join('');
    } else {
      header = '<tr><th>Keyword</th><th>Match</th><th>Ad Group</th><th class="num">Impr.</th><th class="num">Clicks</th><th class="num">CTR</th><th class="num">CPC</th><th class="num">Cost</th></tr>';
      rows = arr.slice(0,10).map(function(c){
        return '<tr>' +
          '<td>' + esc(c.keyword || '') + '</td>' +
          '<td>' + esc(c.matchType || '') + '</td>' +
          '<td>' + esc(c.adGroup || '') + '</td>' +
          '<td class="num">' + fmtN(c.impressions) + '</td>' +
          '<td class="num">' + (c.clicks || 0) + '</td>' +
          '<td class="num">' + (c.CTR || '') + '</td>' +
          '<td class="num">' + (c.avgCPC || '') + '</td>' +
          '<td class="num">' + fmtMoney(c.cost) + '</td>' +
        '</tr>';
      }).join('');
    }
    document.getElementById('perfTable').innerHTML = '<table class="perf"><thead>' + header + '</thead><tbody>' + rows + '</tbody></table>';
  }

  function fmtN(n){
    if (n == null || n === '') return '';
    if (typeof n === 'number') return n.toLocaleString();
    return n;
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; });
  }

  function render(){
    if (!state.data) return;
    document.getElementById('asof').textContent = formatAsOf((state.data.windows && state.data.windows.asOf) || state.data.snapshot_date);
    var k = computeKpis();
    renderVerdict(k);
    renderKpis(k);
    renderSources();
    renderHealth();
    renderPerf();
  }

  function formatAsOf(s){
    if (!s) return '--';
    try {
      var d = new Date(s + 'T00:00:00');
      return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    } catch(e){ return s; }
  }

  // LOAD
  fetch('data/current.json?cb=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(j){ state.data = j; render(); })
    .catch(function(e){
      document.getElementById('verdictLine').textContent = 'Error loading dashboard data.';
      console.error(e);
    });
})();
</script>
</body>
</html>
